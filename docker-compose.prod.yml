services:
  api:
    image: ghcr.io/remymoro/rdc-api:latest
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-900}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:-604800}
      AUTH_PROTECT_CENTRES: ${AUTH_PROTECT_CENTRES:-true}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-images}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rdc-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/remymoro/rdc-frontend:latest
    ports:
      - "127.0.0.1:4201:80"
    networks:
      - rdc-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rdc-network
    restart: unless-stopped

networks:
  rdc-network:
    driver: bridge

volumes:
  postgres_prod_data:
