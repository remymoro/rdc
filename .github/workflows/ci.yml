name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        
      - name: Lint frontend
        run: npx nx lint frontend


      - name: Lint api
        run: npx nx lint api

      - name: Test frontend
        run: npx nx test frontend --passWithNoTests

      - name: Test api
        run: npx nx test api --passWithNoTests

      - name: Build frontend
        run: npx nx build frontend

      - name: Build api
        run: npx nx build api